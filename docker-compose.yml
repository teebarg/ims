services:
  ims-api:
    image: ims-api:${TAG-latest}
    labels:
      - traefik.enable=true
      - traefik.docker.network=dev-net
      - traefik.http.services.ims-api.loadbalancer.server.port=8000
      - traefik.http.routers.ims-api.rule=Host(`api.ims.lvh.me`)
      - traefik.http.routers.ims-api.entrypoints=https
      - traefik.http.routers.ims-api.tls=true
      - traefik.http.routers.ims-api-http.rule=Host(`api.ims.lvh.me`)
      - traefik.http.routers.ims-api-http.entrypoints=http
      - traefik.http.routers.ims-api-http.middlewares=redirect-to-https
      - traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https
    networks:
      - dev-net
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:password@postgres:5432/ims
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./:/app
      - /app/.venv

networks:
  dev-net:
    external: true