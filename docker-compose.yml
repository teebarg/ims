  #     - "traefik.http.routers.ims-frontend.rule=Host(`ims.localhost`)"
  #     - "traefik.http.routers.ims-frontend.entrypoints=http"
  #     - "traefik.http.services.ims-frontend.loadbalancer.server.port=5173"
  #   networks:
  #     - traefik-public
  #     - default

  api:
    image: 'ims:${TAG-latest}'
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.ims-backend.loadbalancer.server.port=8000

      - traefik.http.routers.ims-backend-http.rule=Host(`api.localhost`)
      - traefik.http.routers.ims-backend-http.entrypoints=http
    ports:
      - "6003:8000"
    networks:
      - traefik-public
      - default
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg2://admin:password@db:5432/ims
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        INSTALL_DEV: ${INSTALL_DEV-false}
    platform: linux/amd64 # Patch for M1 Mac
    depends_on:
      db:
        condition: service_healthy
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    # command:
    #   - fastapi
    #   - run
    #   - --reload
    #   - "app/main.py"
    develop:
      watch:
        - path: ./
          action: sync
          target: /app
          ignore:
            - ./.venv
            - .venv
        - path: ./pyproject.toml
          action: rebuild
    volumes:
      - ./:/app
      - /app/.venv

  db:
    image: postgres:15
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d ims" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    ports:
      - "6004:5432"
    networks:
      - traefik-public
      - default
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ims
    volumes:
      - db-data:/var/lib/postgresql/data

  adminer:
    image: adminer:5.3.0
    ports:
      - "6005:8080"
    networks:
      - traefik-public
      - default
    depends_on:
      - db
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.constraint-label=traefik-public

      - traefik.http.services.adminer.loadbalancer.server.port=8080

      - traefik.http.routers.adminer-http.rule=Host(`adminer.localhost`)
      - traefik.http.routers.adminer-http.entrypoints=http

volumes:
  db-data:

networks:
  traefik-public:
    external: false
